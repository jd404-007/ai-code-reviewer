# railway.toml — Railway deployment configuration

[build]
builder = "NIXPACKS"
# 1. We strip "type": "module" from package.json dynamically during build
# 2. We compile cleanly to commonjs
buildCommand = "sed -i '/\"type\": \"module\"/d' package.json && npx tsc --module commonjs --target es2022 --outDir dist"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3